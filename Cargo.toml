[package]
name = "http-client"
version = "0.1.0"
edition = "2024"

[dependencies]
act-sdk = { path = "../../act-component-sdk-rust/act-sdk" }
wit-bindgen = { version = "0.53", features = ["async-spawn"] }
serde = { version = "1", features = ["derive"] }
schemars = "1"
serde_json = "1"
url = "2"
wasip3 = "0.4"

[lib]
crate-type = ["cdylib"]
